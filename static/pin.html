<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>{{ brand_name|default('Workflow Planner') }} · PIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=wp1">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png?v=wp1">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }

  /* ===== Floating label field ===== */
  .float-field {
    position: relative;
    padding-top: 14px;
  }
  .float-field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 22px 16px 10px;
    color: #fff;
    font-size: 18px;
    letter-spacing: 0.5em;
    text-align: center;
    transition: border-color 200ms ease, background 200ms ease, box-shadow 200ms ease;
    outline: none;
  }
  .float-field input:hover {
    border-color: rgba(255,255,255,0.3);
  }
  .float-field input:focus {
    border-color: #fff;
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.08);
  }
  .float-field input::placeholder { color: transparent; }

  .float-field label {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    pointer-events: none;
    transition: top 180ms ease, transform 180ms ease, font-size 180ms ease, color 180ms ease;
    background: transparent;
    padding: 0 4px;
    letter-spacing: normal;
  }
  .float-field input:focus + label,
  .float-field input:not(:placeholder-shown) + label {
    top: 18px;
    transform: translateY(0);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.7);
  }

  /* ===== Glass card ===== */
  .glass-card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.6);
  }

  /* ===== Ambient glow (subtle, monochrome) ===== */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.04), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255,255,255,0.025), transparent 50%);
  }

  /* ===== Subtle shake on error ===== */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 220ms ease; }
</style>
</head>
<body class="min-h-screen bg-black text-white flex items-center justify-center px-4">
  <div class="ambient"></div>

  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center mb-8 gap-3">
      {% if brand_has_logo and brand_logo_url %}
      <img src="{{ brand_logo_url }}" alt="{{ brand_name|default('Workflow Planner') }}" class="w-9 h-9 rounded-lg object-cover">
      {% endif %}
      <h1 class="text-xl font-light tracking-[0.12em] uppercase">{{ brand_name|default('Workflow Planner') }}</h1>
    </div>

    <form method="post" action="/pin" class="glass-card p-7 space-y-5" autocomplete="off">
      <input type="hidden" name="next" value="{{ next }}">

      <div class="text-center pb-2">
        <h2 class="text-xs uppercase tracking-[0.25em] text-white/40">Admin Access</h2>
        <p class="text-white/30 text-xs mt-1.5">Masukin PIN untuk buka mode edit</p>
      </div>

      <div class="float-field {% if error %}shake{% endif %}">
        <input
          type="password"
          name="pin"
          id="pin"
          autocomplete="current-password"
          autofocus
          required
          minlength="3"
          placeholder=" "
          inputmode="numeric"
          pattern="[0-9]*"
        >
        <label for="pin">PIN</label>
      </div>

      {% if error %}
      <p class="text-red-400 text-xs text-center -mt-2">{{ error }}</p>
      {% endif %}

      <button type="submit" class="w-full bg-white text-black font-semibold rounded-xl py-3 hover:bg-zinc-200 active:scale-[0.98] transition">
        Buka
      </button>
    </form>

    <p class="text-center text-white/30 text-xs mt-6">
      <a href="/tasks" class="hover:text-white/60 transition">← Balik ke tasks</a>
    </p>
  </div>
</body>
</html>
